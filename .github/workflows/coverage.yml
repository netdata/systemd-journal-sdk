name: Coverage

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "47 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CODACY_ORGANIZATION_PROVIDER: gh
  CODACY_USERNAME: netdata
  CODACY_PROJECT_NAME: systemd-journal-sdk
  CODACY_REPORTER_VERSION: "14.1.3"

jobs:
  go:
    name: Go coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Generate Go coverage
        run: tests/coverage/run_go_coverage.sh

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@v8
        with:
          name: coverage-go
          path: |
            .local/coverage/go/coverage.out
            .local/coverage/go/coverage.txt
          if-no-files-found: error

  python:
    name: Python coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade -r python/requirements.txt coverage==7.14.1

      - name: Generate Python coverage
        run: tests/coverage/run_python_coverage.sh

      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@v8
        with:
          name: coverage-python
          path: |
            .local/coverage/python/cobertura.xml
            .local/coverage/python/coverage.txt
          if-no-files-found: error

  node:
    name: Node.js coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install Node.js dependencies
        working-directory: node
        run: npm ci

      - name: Generate Node.js coverage
        run: tests/coverage/run_node_coverage.sh

      - name: Upload Node.js coverage artifact
        uses: actions/upload-artifact@v8
        with:
          name: coverage-node
          path: |
            .local/coverage/node/lcov.info
          if-no-files-found: error

  rust:
    name: Rust coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate Rust coverage
        run: tests/coverage/run_rust_coverage.sh

      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v8
        with:
          name: coverage-rust
          path: |
            .local/coverage/rust/lcov.info
          if-no-files-found: error

  upload:
    name: Upload coverage to Codacy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - go
      - python
      - node
      - rust

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          path: .local/coverage-artifacts

      - name: Upload coverage
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
        run: tests/coverage/upload_codacy_coverage.sh

      - name: Write coverage summary
        run: |
          {
            echo "## Coverage"
            echo
            if [ -n "${CODACY_API_TOKEN:-}" ]; then
              echo "Coverage reports were uploaded to Codacy."
            else
              echo "Coverage reports were generated, but Codacy upload was skipped because \`CODACY_API_TOKEN\` is not configured for this run."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
